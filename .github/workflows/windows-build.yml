name: Windows Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags:
      - 'v*-beta.*'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Check Rust
        run: cargo check --locked

      - name: Check Python tools
        run: python -m py_compile tools/convert_hatch_pet.py

      - name: Install Python test dependencies
        run: python -m pip install pillow

      - name: Test Python tools
        run: python tools/test_convert_hatch_pet.py

      - name: Privacy scan repository text
        shell: pwsh
        run: |
          $patterns = @(
            '[A-Za-z]:\\Users\\',
            ('\.codex' + '\\pets'),
            ('\.codex' + '/pets'),
            'BEGIN (RSA |OPENSSH |EC |)PRIVATE KEY',
            '(?i)(api[_-]?key|client[_-]?secret)\s*[:=]\s*["''][^"'']+["'']'
          )
          $excludedDirs = @('.git', 'target', 'dist', 'pets', '.planning')
          $files = Get-ChildItem . -Recurse -File | Where-Object {
            $_.Extension -in @('.txt', '.md', '.toml', '.json', '.py', '.ps1', '.yml', '.yaml', '.rs') -and
            ($excludedDirs -notcontains $_.Directory.Name) -and
            ($_.FullName -notlike '*\.github\workflows\windows-build.yml')
          }
          foreach ($file in $files) {
            $text = Get-Content -Raw -LiteralPath $file.FullName
            foreach ($pattern in $patterns) {
              if ($text -match $pattern) {
                throw "Repository privacy scan failed: $($file.FullName) matched $pattern"
              }
            }
          }

      - name: Build
        run: cargo build --release --locked

      - name: Collect package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target/release/lightweight_desktop_pet.exe dist/pet.exe
          Copy-Item pet.json dist/pet.json
          Copy-Item config.example.toml dist/config.example.toml
          Copy-Item README.md dist/README.md
          New-Item -ItemType Directory -Force dist/tools
          Copy-Item tools/convert_hatch_pet.py dist/tools/convert_hatch_pet.py
          Get-FileHash dist/pet.exe -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  pet.exe" } | Set-Content dist/SHA256SUMS.txt

      - name: Privacy scan package
        shell: pwsh
        run: |
          $patterns = @(
            '[A-Za-z]:\\Users\\',
            '\.codex\\pets',
            '\.codex/pets'
          )
          $files = Get-ChildItem dist -Recurse -File | Where-Object {
            $_.Extension -in @('.txt', '.md', '.toml', '.json', '.py', '.ps1', '.yml', '.yaml')
          }
          foreach ($file in $files) {
            $text = Get-Content -Raw -LiteralPath $file.FullName
            foreach ($pattern in $patterns) {
              if ($text -match $pattern) {
                throw "Privacy scan failed: $($file.FullName) matched $pattern"
              }
            }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightweight-desktop-pet-windows
          path: dist/**
          retention-days: 14

      - name: Publish beta pre-release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Compress-Archive -Path dist/* -DestinationPath petmui-windows.zip -Force
          gh release create $env:GITHUB_REF_NAME petmui-windows.zip `
            --title "$env:GITHUB_REF_NAME" `
            --notes "Beta pre-release build from GitHub Actions. The package contains pet.exe, default assets, config example, README, converter tool, and SHA256 checksums." `
            --prerelease
